generations:
  - name: "982 Generation"
    start_year: 2016
    end_year: null
    description: "The Porsche 718 nameplate was revived in 2016 for the fourth generation of the Boxster and Cayman models (Type 982), paying homage to the successful Porsche 718 race car from the late 1950s and early 1960s. This generation marked a significant powertrain shift, replacing the naturally aspirated flat-six engines with turbocharged flat-four engines. The base models received a 2.0-liter turbocharged flat-four producing 300 horsepower, while the S variants featured a 2.5-liter turbocharged flat-four with 350 horsepower utilizing Variable Turbine Geometry (VTG) technology. The GTS models, introduced in 2017, initially used an uprated version of the 2.5-liter turbo-four with 365 horsepower. In 2020, Porsche introduced the GTS 4.0 model featuring a naturally aspirated 4.0-liter flat-six engine with 394 horsepower, derived from the 911 GT3, paired with a 6-speed manual transmission. The track-focused Cayman GT4 and Boxster Spyder models also retained naturally aspirated flat-six engines. The 2021 Cayman GT4 RS introduced the first RS treatment for the Cayman, using a 4.0-liter naturally aspirated flat-six producing 493 horsepower, derived from the 911 GT3. Although the switch to four-cylinder engines was controversial among purists, the 718 generation delivered improved torque, better fuel economy, and enhanced performance figures. The chassis was refined with technology derived from the 911, including retuned suspension, upgraded brakes, and more responsive steering. The exterior design featured a distinctive black trim bar connecting the taillights, redesigned mirrors, and updated bumpers. The interior was modernized with Porsche's PCM 4.0 infotainment system and a mode selector switch for driving modes. In May 2025, Porsche announced that global production would end in October 2025, with electric replacements planned for the medium term."
